id: surf
name: Surf
summary: Migrated KUHBS config for surf
description: Disposable browser qubes for LibreWolf, Firefox, or Chromium
icon: icon.svg
order: 500
type: udp
template: debian-13-minimal

kuhs:

  tpl:
    prefs:
      netvm: ndp-kuhbs-net-gateway
    setup_scripts:
      - /usr/share/kuhbs/setup-scripts/kuhbs/setup/apt-sources-list-enforce-http.sh
      - /usr/share/kuhbs/setup-scripts/kuhbs/setup/apt-update.sh
      - /usr/share/kuhbs/setup-scripts/kuhbs/setup/basics.sh
      - /usr/share/kuhbs/setup-scripts/kuhbs/setup/networking-packages.sh
      - /usr/share/kuhbs/setup-scripts/kuhbs/setup/install-flatpak.sh
      - /usr/share/kuhbs/setup-scripts/kuhbs/setup/passwordless-sudo-shutdown.sh

  app:
    instances:
      - id: default
        i3_integration_auto_pause: True
        prefs:
          netvm: ndp-kuhbs-net-gateway
          label: yellow
          template_for_dispvms: True
        launchers:

          - id: firefox
            name: Firefox
            user: user
            command: /usr/bin/flatpak run org.mozilla.firefox
            dispvm: True
            run_in_terminal: False
            shutdown_on_exit_0: True

          - id: librewolf
            name: Librewolf
            user: user
            command: /usr/bin/flatpak run io.gitlab.librewolf-community
            dispvm: True
            run_in_terminal: False
            shutdown_on_exit_0: True
            autostart: True

          - id: chromium
            name: Chromium
            user: user
            command: /usr/bin/flatpak run io.github.ungoogled_software.ungoogled_chromium
            dispvm: True
            run_in_terminal: False
            shutdown_on_exit_0: True

          - id: mullvad-browser
            name: Mullvad Browser
            user: user
            command: /usr/bin/flatpak run net.mullvad.MullvadBrowser
            dispvm: True
            run_in_terminal: False
            shutdown_on_exit_0: True

          - id: terminal
            name: Terminal
            user: user
            command: terminal
            dispvm: True
            run_in_terminal: False
            shutdown_on_exit_0: False
